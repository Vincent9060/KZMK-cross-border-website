<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>产品中心 - 深圳开智镁客</title>
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eef5ff',
              100: '#d8e8ff',
              200: '#b9d5ff',
              300: '#89b7ff',
              400: '#5e95ff',
              500: '#2f6bff',
              600: '#1f56db',
              700: '#1d47b3',
              800: '#1f3f8d',
              900: '#203768'
            },
            ink: '#0b1220',
            soft: '#f5f7fb',
            accent: '#ff6a1a'
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="page-body">
  <header class="site-header" id="siteHeader">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="flex h-16 items-center justify-between gap-4">
        <a href="../index.html" class="flex items-center gap-3">
          <div class="brand-mark">GB</div>
          <div>
            <div class="brand-name" data-i18n="companyName">深圳开智镁客</div>
            <div class="brand-sub" data-i18n="brandTag">Cross-Border Trade</div>
          </div>
        </a>
        <nav class="hidden items-center gap-8 lg:flex">
          <a class="nav-link" href="../index.html" data-i18n="navHome">首页</a>
          <a class="nav-link" href="company.html" data-i18n="navCompany">公司介绍</a>
          <a class="nav-link" href="products.html" data-i18n="navProducts">产品中心</a>
          <a class="nav-link" href="contact.html" data-i18n="navContact">联系我们</a>
        </nav>
        <div class="hidden items-center gap-3 lg:flex">
          <div class="lang-switcher">
            <select class="lang-select" aria-label="language select">
              <option value="zh">中文</option>
              <option value="en">English</option>
              <option value="ja">日本語</option>
              <option value="ms">Bahasa Melayu</option>
            </select>
          </div>
        </div>
        <button id="mobileMenuBtn" class="mobile-toggle lg:hidden" aria-label="menu"><span></span><span></span><span></span></button>
      </div>
    </div>
    <div id="mobileMenu" class="mobile-menu lg:hidden">
      <div class="mx-auto max-w-7xl px-4 py-4 sm:px-6">
        <div class="flex flex-col gap-4">
          <a class="mobile-link" href="../index.html" data-i18n="navHome">首页</a>
          <a class="mobile-link" href="company.html" data-i18n="navCompany">公司介绍</a>
          <a class="mobile-link" href="products.html" data-i18n="navProducts">产品中心</a>
          <a class="mobile-link" href="contact.html" data-i18n="navContact">联系我们</a>
          <div class="lang-switcher mt-2">
            <select class="lang-select w-full" aria-label="language select mobile">
              <option value="zh">中文</option>
              <option value="en">English</option>
              <option value="ja">日本語</option>
              <option value="ms">Bahasa Melayu</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="pt-20">
    <section class="inner-hero">
      <div class="mx-auto max-w-7xl px-4 py-20 sm:px-6 lg:px-8">
        <span class="section-kicker" data-i18n="productsHeroKicker">产品中心</span>
        <h1 class="inner-title" data-i18n="productsHeroTitle">多品类精选产品，服务全球渠道客户</h1>
        <p class="inner-desc" data-i18n="productsHeroDesc">所有产品信息、名称、价格与简介均支持四种语言同步切换，方便国际业务展示与沟通。</p>
      </div>
    </section>

    <section class="section-shell">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="section-head reveal">
          <span class="section-kicker" data-i18n="productsListKicker">产品列表</span>
          <h2 class="section-title" data-i18n="productsListTitle">热销产品推荐</h2>
          <p class="section-desc" data-i18n="productsListDesc">适合跨境批发、电商零售、品牌定制与区域代理等多种合作模式。</p>
        </div>
        <div id="productsPageGrid" class="mt-10 grid gap-6 sm:grid-cols-2 xl:grid-cols-4"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="mx-auto flex max-w-7xl flex-col gap-4 px-4 py-8 text-sm text-slate-300 sm:px-6 lg:flex-row lg:items-center lg:justify-between lg:px-8">
      <div><div class="font-semibold text-white" data-i18n="companyName">深圳开智镁客</div><div data-i18n="footerText">专业跨境电商与国际贸易合作伙伴</div></div>
      <div data-i18n="footerCopy">© 2025 深圳开智镁客. All Rights Reserved.</div>
    </div>
  </footer>

  <script src="../js/lang.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
